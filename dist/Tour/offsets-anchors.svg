<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="dim" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#E07B2E"/>
    </marker>
    <marker id="dimg" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#9AA0A8"/>
    </marker>
  </defs>

  <!-- ===================== HEADING ===================== -->
  <text x="125" y="13" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2B2F36">What the Offsets measure</text>
  <text x="125" y="24" text-anchor="middle" font-size="7.5" fill="#6E7681">the 4 Offsets are read differently per Anchor</text>

  <!-- ===================== HORIZONTAL ===================== -->
  <text x="10" y="40" font-size="8.5" font-weight="600" fill="#1D6FD8">Horizontal &#183; Anchors[0]  &#8594;  O&#8320;, O&#8321;</text>

  <!--  A) left-width : pinned left, fixed size  -->
  <text x="6" y="65" font-size="7.5" font-weight="600" fill="#2B2F36">left-width</text>
  <text x="6" y="76" font-size="6" fill="#9AA0A8">pinned left</text>
  <rect x="70" y="46" width="140" height="42" rx="5" fill="#FFFFFF" stroke="#6E7681" stroke-width="1.6"/>
  <rect x="88" y="63" width="46" height="18" rx="2.5" fill="#DCE9FB" stroke="#1D6FD8" stroke-width="1.3"/>
  <!-- O0 left -->
  <line x1="70" y1="57" x2="70" y2="79" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="88" y1="57" x2="88" y2="79" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="70.5" y1="59" x2="87.5" y2="59" stroke="#E07B2E" stroke-width="1.1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="79" y="55" text-anchor="middle" font-size="6.5" fill="#B5611F" font-weight="600">left</text>
  <!-- O1 width -->
  <line x1="134" y1="57" x2="134" y2="79" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="88.5" y1="59" x2="133.5" y2="59" stroke="#E07B2E" stroke-width="1.1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="111" y="55" text-anchor="middle" font-size="6.5" fill="#B5611F" font-weight="600">width</text>
  <text x="79" y="75" text-anchor="middle" font-size="6" fill="#1D6FD8" font-weight="700">O&#8320;</text>
  <text x="111" y="75" text-anchor="middle" font-size="6" fill="#1D6FD8" font-weight="700">O&#8321;</text>

  <!--  B) left-right : stretches, both margins fixed  -->
  <text x="6" y="113" font-size="7.5" font-weight="600" fill="#2B2F36">left-right</text>
  <text x="6" y="124" font-size="6" fill="#9AA0A8">stretches</text>
  <rect x="70" y="94" width="140" height="42" rx="5" fill="#FFFFFF" stroke="#6E7681" stroke-width="1.6"/>
  <rect x="88" y="111" width="106" height="18" rx="2.5" fill="#DCE9FB" stroke="#1D6FD8" stroke-width="1.3"/>
  <!-- O0 left -->
  <line x1="70" y1="105" x2="70" y2="127" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="88" y1="105" x2="88" y2="127" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="70.5" y1="107" x2="87.5" y2="107" stroke="#E07B2E" stroke-width="1.1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="79" y="103" text-anchor="middle" font-size="6.5" fill="#B5611F" font-weight="600">left</text>
  <!-- O1 right -->
  <line x1="194" y1="105" x2="194" y2="127" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="210" y1="105" x2="210" y2="127" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="194.5" y1="107" x2="209.5" y2="107" stroke="#E07B2E" stroke-width="1.1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="202" y="103" text-anchor="middle" font-size="6.5" fill="#B5611F" font-weight="600">right</text>
  <text x="79" y="123" text-anchor="middle" font-size="6" fill="#1D6FD8" font-weight="700">O&#8320;</text>
  <text x="202" y="123" text-anchor="middle" font-size="6" fill="#1D6FD8" font-weight="700">O&#8321;</text>
  <!-- derived width (drawn inside the widget) -->
  <line x1="89" y1="123" x2="193" y2="123" stroke="#9AA0A8" stroke-width="0.9" stroke-dasharray="3 2" marker-start="url(#dimg)" marker-end="url(#dimg)"/>
  <text x="141" y="120" text-anchor="middle" font-size="5.5" fill="#5A6068" font-style="italic">width = flexes</text>

  <!--  C) width-right : pinned right, fixed size  -->
  <text x="6" y="161" font-size="7.5" font-weight="600" fill="#2B2F36">width-right</text>
  <text x="6" y="172" font-size="6" fill="#9AA0A8">pinned right</text>
  <rect x="70" y="142" width="140" height="42" rx="5" fill="#FFFFFF" stroke="#6E7681" stroke-width="1.6"/>
  <rect x="146" y="159" width="46" height="18" rx="2.5" fill="#DCE9FB" stroke="#1D6FD8" stroke-width="1.3"/>
  <!-- O0 width -->
  <line x1="146" y1="153" x2="146" y2="175" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="192" y1="153" x2="192" y2="175" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="146.5" y1="155" x2="191.5" y2="155" stroke="#E07B2E" stroke-width="1.1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="169" y="151" text-anchor="middle" font-size="6.5" fill="#B5611F" font-weight="600">width</text>
  <!-- O1 right -->
  <line x1="210" y1="153" x2="210" y2="175" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="192.5" y1="155" x2="209.5" y2="155" stroke="#E07B2E" stroke-width="1.1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="201" y="151" text-anchor="middle" font-size="6.5" fill="#B5611F" font-weight="600">right</text>
  <text x="169" y="171" text-anchor="middle" font-size="6" fill="#1D6FD8" font-weight="700">O&#8320;</text>
  <text x="201" y="171" text-anchor="middle" font-size="6" fill="#1D6FD8" font-weight="700">O&#8321;</text>
  <!-- derived left (raised to the widget's vertical centre) -->
  <line x1="70.5" y1="168" x2="145.5" y2="168" stroke="#9AA0A8" stroke-width="0.9" stroke-dasharray="3 2" marker-start="url(#dimg)" marker-end="url(#dimg)"/>
  <text x="106" y="166" text-anchor="middle" font-size="5.5" fill="#6E7681" font-style="italic">left = flexes</text>

  <!-- ===================== VERTICAL ===================== -->
  <text x="10" y="198" font-size="8.5" font-weight="600" fill="#1D6FD8">Vertical &#183; Anchors[1]  &#8594;  O&#8322;, O&#8323;</text>

  <!--  V1) top-height : pinned top  -->
  <rect x="10" y="206" width="68" height="108" rx="5" fill="#FFFFFF" stroke="#6E7681" stroke-width="1.6"/>
  <rect x="36" y="228" width="16" height="50" rx="2.5" fill="#DCE9FB" stroke="#1D6FD8" stroke-width="1.3"/>
  <!-- top -->
  <line x1="13" y1="206" x2="29" y2="206" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="13" y1="228" x2="29" y2="228" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="21" y1="206.5" x2="21" y2="227.5" stroke="#E07B2E" stroke-width="1.1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="16" y="217" text-anchor="middle" font-size="6.5" fill="#B5611F" font-weight="600" transform="rotate(-90 16 217)">top</text>
  <!-- height -->
  <line x1="13" y1="278" x2="29" y2="278" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="21" y1="228.5" x2="21" y2="277.5" stroke="#E07B2E" stroke-width="1.1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="16" y="253" text-anchor="middle" font-size="6.5" fill="#B5611F" font-weight="600" transform="rotate(-90 16 253)">height</text>
  <text x="44" y="241" text-anchor="middle" font-size="6" fill="#1D6FD8" font-weight="700">O&#8322;</text>
  <text x="44" y="267" text-anchor="middle" font-size="6" fill="#1D6FD8" font-weight="700">O&#8323;</text>
  <text x="44" y="324" text-anchor="middle" font-size="6.5" font-weight="600" fill="#2B2F36">top-height</text>
  <text x="44" y="332" text-anchor="middle" font-size="5.5" fill="#9AA0A8">pinned top</text>

  <!--  V2) top-bottom : stretches  -->
  <rect x="91" y="206" width="68" height="108" rx="5" fill="#FFFFFF" stroke="#6E7681" stroke-width="1.6"/>
  <rect x="117" y="230" width="16" height="54" rx="2.5" fill="#DCE9FB" stroke="#1D6FD8" stroke-width="1.3"/>
  <!-- top -->
  <line x1="94" y1="206" x2="110" y2="206" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="94" y1="230" x2="110" y2="230" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="102" y1="206.5" x2="102" y2="229.5" stroke="#E07B2E" stroke-width="1.1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="97" y="218" text-anchor="middle" font-size="6.5" fill="#B5611F" font-weight="600" transform="rotate(-90 97 218)">top</text>
  <!-- bottom -->
  <line x1="94" y1="284" x2="110" y2="284" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="94" y1="314" x2="110" y2="314" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="102" y1="284.5" x2="102" y2="313.5" stroke="#E07B2E" stroke-width="1.1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="97" y="299" text-anchor="middle" font-size="6.5" fill="#B5611F" font-weight="600" transform="rotate(-90 97 299)">bottom</text>
  <text x="125" y="244" text-anchor="middle" font-size="6" fill="#1D6FD8" font-weight="700">O&#8322;</text>
  <text x="125" y="272" text-anchor="middle" font-size="6" fill="#1D6FD8" font-weight="700">O&#8323;</text>
  <!-- derived height -->
  <line x1="147" y1="230.5" x2="147" y2="283.5" stroke="#9AA0A8" stroke-width="0.9" stroke-dasharray="3 2" marker-start="url(#dimg)" marker-end="url(#dimg)"/>
  <text x="146" y="257" text-anchor="middle" font-size="5.5" fill="#6E7681" font-style="italic" transform="rotate(-90 146 257)">height flexes</text>
  <text x="125" y="324" text-anchor="middle" font-size="6.5" font-weight="600" fill="#2B2F36">top-bottom</text>
  <text x="125" y="332" text-anchor="middle" font-size="5.5" fill="#9AA0A8">stretches</text>

  <!--  V3) height-bottom : pinned bottom  -->
  <rect x="172" y="206" width="68" height="108" rx="5" fill="#FFFFFF" stroke="#6E7681" stroke-width="1.6"/>
  <rect x="198" y="244" width="16" height="46" rx="2.5" fill="#DCE9FB" stroke="#1D6FD8" stroke-width="1.3"/>
  <!-- height -->
  <line x1="175" y1="244" x2="191" y2="244" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="175" y1="290" x2="191" y2="290" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="183" y1="244.5" x2="183" y2="289.5" stroke="#E07B2E" stroke-width="1.1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="178" y="267" text-anchor="middle" font-size="6.5" fill="#B5611F" font-weight="600" transform="rotate(-90 178 267)">height</text>
  <!-- bottom -->
  <line x1="175" y1="314" x2="191" y2="314" stroke="#E07B2E" stroke-width="0.7"/>
  <line x1="183" y1="290.5" x2="183" y2="313.5" stroke="#E07B2E" stroke-width="1.1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="178" y="302" text-anchor="middle" font-size="6.5" fill="#B5611F" font-weight="600" transform="rotate(-90 178 302)">bottom</text>
  <text x="206" y="258" text-anchor="middle" font-size="6" fill="#1D6FD8" font-weight="700">O&#8322;</text>
  <text x="206" y="278" text-anchor="middle" font-size="6" fill="#1D6FD8" font-weight="700">O&#8323;</text>
  <!-- derived top -->
  <line x1="228" y1="206.5" x2="228" y2="243.5" stroke="#9AA0A8" stroke-width="0.9" stroke-dasharray="3 2" marker-start="url(#dimg)" marker-end="url(#dimg)"/>
  <text x="227" y="225" text-anchor="middle" font-size="5.5" fill="#6E7681" font-style="italic" transform="rotate(-90 227 225)">top flexes</text>
  <text x="206" y="324" text-anchor="middle" font-size="6.5" font-weight="600" fill="#2B2F36">height-bottom</text>
  <text x="206" y="332" text-anchor="middle" font-size="5.5" fill="#9AA0A8">pinned bottom</text>

  <!-- ===================== LEGEND ===================== -->
  <line x1="12" y1="343" x2="26" y2="343" stroke="#E07B2E" stroke-width="1.4" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="30" y="345.5" font-size="6" fill="#2B2F36">stored Offset (fixed)</text>
  <line x1="128" y1="343" x2="142" y2="343" stroke="#9AA0A8" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="146" y="345.5" font-size="6" fill="#2B2F36">derived (flexes on resize)</text>
</svg>
